# Scenario E: AIM-7 vs RS-28 Sarmat — Ballistic Intercept
# High altitude target in gravity arc, high closing speed
name: E
label: ballistic_intercept
description: "AIM-7 vs RS-28 Sarmat, ballistic intercept (head-on, high-speed)"

# vehicles: aim7, f16, gaudet, rs28_sarmat (see simulation/config/vehicles/)
UAV_config_file: "simulation/config/vehicles/aim7.yaml"
target_config_file: "simulation/config/vehicles/rs28_sarmat.yaml"

# guidance: pro_nav (PN), APN, ZEM, pure_pursuit
guidance_type: "pro_nav"

# autopilot: UAVPIDAutopilot, AircraftPIDAutopilot
autopilot_type: "UAVPIDAutopilot"

# reward models: gaudet, gaudet_tight (see simulation/config/rewards/)
reward_type: "gaudet"
reward_config: "simulation/config/rewards/gaudet.yaml"

# behaviors: evasive, evasive_mild, straight, ballistic (see simulation/config/behaviors/)
behavior_config: "simulation/config/behaviors/ballistic.yaml"

observation_shape: [23]
action_shape: [3]
fdm_steps_per_action: 5
max_episode_time: 60.0
action_scale: 1.0

path_constraints:
  speed_min: 400.0
  pitch_max: 85.0
  yaw_max: 85.0
  roll_max: 100.0
  look_angle_max: 90.0
  load_max: 80.0
  alt_min: 0.0

# target starts high and fast, diving toward interceptor
initial_conditions:
  range_min: 8000.0
  range_max: 15000.0
  UAV_speed_min: 800.0
  UAV_speed_max: 1000.0
  target_speed_min: 600.0         # ballistic reentry speed
  target_speed_max: 1200.0
  UAV_alt_min: 5000.0
  UAV_alt_max: 10000.0
  target_alt_min: 15000.0         # starts high
  target_alt_max: 30000.0
  elevation_min: 10.0             # looking up at target
  elevation_max: 45.0
  azimuth_min: -15.0
  azimuth_max: 15.0
  ref_lat: 58.0
  ref_lon: 18.0
