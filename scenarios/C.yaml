# Scenario C: AIM-7 vs F-16 — Wide Angle (+-45 deg)
# Large off-boresight angles, tests target acquisition ability
name: C
label: wide_angle
description: "AIM-7 vs F-16, wide angle (+-45 deg)"

# vehicles: aim7, f16, gaudet, rs28_sarmat (see simulation/config/vehicles/)
UAV_config_file: "simulation/config/vehicles/aim7.yaml"
target_config_file: "simulation/config/vehicles/f16.yaml"

# guidance: pro_nav (PN), APN, ZEM, pure_pursuit
guidance_type: "pro_nav"

# autopilot: UAVPIDAutopilot, AircraftPIDAutopilot
autopilot_type: "UAVPIDAutopilot"

# reward models: gaudet, gaudet_tight (see simulation/config/rewards/)
reward_type: "gaudet"
reward_config: "simulation/config/rewards/gaudet_tight.yaml"

# behaviors: evasive, evasive_mild, straight, ballistic (see simulation/config/behaviors/)
behavior_config: "simulation/config/behaviors/evasive.yaml"

observation_shape: [23]
action_shape: [3]
fdm_steps_per_action: 10
max_episode_time: 30.0
action_scale: 1.0

path_constraints:
  speed_min: 400.0
  pitch_max: 85.0
  yaw_max: 85.0
  roll_max: 100.0
  look_angle_max: 90.0
  load_max: 80.0
  alt_min: 0.0

initial_conditions:
  range_min: 5000.0
  range_max: 10000.0
  UAV_speed_min: 800.0
  UAV_speed_max: 1000.0
  target_speed_min: 250.0
  target_speed_max: 600.0
  UAV_alt_min: 5000.0
  UAV_alt_max: 10000.0
  target_alt_min: 4000.0
  target_alt_max: 11000.0
  elevation_min: -45.0            # wide angles
  elevation_max: 45.0
  azimuth_min: -45.0
  azimuth_max: 45.0
  ref_lat: 58.0
  ref_lon: 18.0
