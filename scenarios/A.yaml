# Scenario A: Gaudet vs F-16 — Easy proof-of-concept
# Short range, slow non-maneuvering target, near head-on, plenty of time
name: A
label: easy_intercept
description: "Gaudet vs F-16, easy intercept (3-5 km, no maneuver)"

# vehicles: aim7, f16, gaudet, rs28_sarmat (see simulation/config/vehicles/)
UAV_config_file: "simulation/config/vehicles/gaudet.yaml"
target_config_file: "simulation/config/vehicles/f16.yaml"

# guidance: pro_nav (PN), APN, ZEM, pure_pursuit
guidance_type: "pro_nav"

# autopilot: UAVPIDAutopilot, AircraftPIDAutopilot
autopilot_type: "UAVPIDAutopilot"

# reward models: gaudet, gaudet_tight (see simulation/config/rewards/)
reward_type: "gaudet"
reward_config: "simulation/config/rewards/gaudet.yaml"

# behaviors: evasive, evasive_mild, straight, ballistic (see simulation/config/behaviors/)
behavior_config: "simulation/config/behaviors/evasive_mild.yaml"

observation_shape: [23]
action_shape: [3]                 # [aileron, elevator, rudder]
fdm_steps_per_action: 5
max_episode_time: 60.0            # seconds
action_scale: 1.0

# Flight envelope (episode terminates if violated)
path_constraints:
  speed_min: 400.0                # m/s
  pitch_max: 85.0                 # degrees
  yaw_max: 85.0
  roll_max: 100.0
  look_angle_max: 90.0
  load_max: 80.0                  # g's
  alt_min: 0.0

# Engagement geometry (randomized per episode)
initial_conditions:
  range_min: 3000.0               # meters
  range_max: 5000.0
  UAV_speed_min: 800.0            # m/s
  UAV_speed_max: 1000.0
  target_speed_min: 200.0
  target_speed_max: 300.0
  UAV_alt_min: 5000.0             # meters
  UAV_alt_max: 8000.0
  target_alt_min: 5000.0
  target_alt_max: 8000.0
  elevation_min: -15.0            # LOS angles (degrees)
  elevation_max: 15.0
  azimuth_min: -15.0
  azimuth_max: 15.0
  ref_lat: 58.0
  ref_lon: 18.0
