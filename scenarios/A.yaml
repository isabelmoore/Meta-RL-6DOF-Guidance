# Scenario A: Baseline engagement
# Short range, near head-on, slower target.
# To swap vehicles, change UAV_config_file / target_config_file below.

name: A
label: paper_ICs
description: "AIM-7 vs F-16, easy intercept (3-5 km, no maneuver)"

UAV_config_file: "simulation/config/aim7.yaml"
target_config_file: "simulation/config/f16.yaml"
guidance_type: "pro_nav"
autopilot_type: "UAVPIDAutopilot"
reward_type: "paper"

observation_shape: [23]
action_shape: [3]
fdm_steps_per_action: 5
max_episode_time: 60.0        # episode timeout, seconds
action_scale: 1.0

reward_params:
  alpha: 0.1                  # LOS rate weight
  sigma_omega: 0.05           # LOS rate width, rad/s
  roll_rate_penalty: 0.05     # roll rate weight
  ctrl_penalty: 0.01          # control effort weight
  hit_bonus: 500.0            # hit reward
  violation_penalty: 25.0     # constraint violation penalty
  hit_radius: 50.0            # final hit radius, meters
  hit_radius_start: 500.0     # curriculum start radius, meters
  hit_radius_end: 50.0        # curriculum end radius, meters
  curriculum_steps: 4000000.0  # curriculum duration, timesteps
  proximity_weight: 0.5       # proximity reward weight
  miss_reward_scale: 300.0    # miss decay scale, meters

path_constraints:
  speed_min: 400.0            # min airspeed, m/s
  pitch_max: 85.0             # max pitch, degrees
  yaw_max: 85.0               # max yaw, degrees
  roll_max: 100.0             # max roll, degrees
  look_angle_max: 90.0        # max look angle, degrees
  load_max: 80.0              # max load factor, g
  alt_min: 0.0                # min altitude, meters

initial_conditions:
  range_min: 3000.0           # min range, meters
  range_max: 5000.0           # max range, meters
  UAV_speed_min: 800.0        # min UAV speed, m/s
  UAV_speed_max: 1000.0       # max UAV speed, m/s
  target_speed_min: 200.0     # min target speed, m/s
  target_speed_max: 300.0     # max target speed, m/s
  UAV_alt_min: 5000.0         # min UAV altitude, meters
  UAV_alt_max: 8000.0         # max UAV altitude, meters
  target_alt_min: 5000.0      # min target altitude, meters
  target_alt_max: 8000.0      # max target altitude, meters
  elevation_min: -15.0        # min elevation angle, degrees
  elevation_max: 15.0         # max elevation angle, degrees
  azimuth_min: -15.0          # min azimuth angle, degrees
  azimuth_max: 15.0           # max azimuth angle, degrees
  ref_lat: 58.0               # reference latitude, degrees
  ref_lon: 18.0               # reference longitude, degrees

target_maneuver:
  maneuver_interval_min: 3.0  # min time between maneuvers, seconds
  maneuver_interval_max: 8.0  # max time between maneuvers, seconds
  heading_change_max: 30.0    # max heading change, degrees
  alt_change_max: 1500.0      # max altitude change, meters
  throttle: 0.49              # target throttle, 0-1
