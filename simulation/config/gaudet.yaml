name: "Gaudet"
type: "UAV"
fdm_xml: "jsbsim_data/scripts/AIM_test.xml"
fdm_aircraft: "AIM"

# --- Physical Properties (Gaudet & Furfaro 2023) ---
# "Integrated and Adaptive Guidance and Control for
#  Endoatmospheric Missiles via Reinforcement Meta-Learning"
# Mass: 455 kg, Length: 6.25 m, Diameter: 0.31 m
mass:
  weight_lbs: 1003.0
  ixx: 8.06
  iyy: 1094.0
  izz: 1094.0

geometry:
  length_in: 246.0
  diameter_ft: 1.02
  wingspan_ft: 4.13
  wingarea_ft2: 0.81
  cg_x_in: 123.2

# --- Aerodynamic Coefficients ---
aero:
  ca_base: 0.35
  ca_induced: 4.0
  cn_alpha_body_wing: 6.0
  cn_crossflow: 38.5
  cn_alpha_tail: 4.0
  cn_delta_tail: -4.0
  cy_body_wing: -6.0
  cy_crossflow: -38.5
  cy_tail_beta: -4.0
  cy_rudder: 4.0
  cm_alpha: -20.4
  cm_elevator: 38.2
  cm_q: -20.0
  cn_beta: 20.4
  cn_rudder: -38.2
  cn_r: -20.0
  cl_aileron: 0.5
  cl_coupling: 0.1
  cl_p: -5.0

# --- Flight Control System Limits ---
fcs:
  elevator_rate_max_deg_s: 40.0
  elevator_pos_max_deg: 10.0
  aileron_rate_max_deg_s: 1.0
  aileron_pos_max_deg: 0.1
  rudder_rate_max_deg_s: 40.0
  rudder_pos_max_deg: 10.0

# --- Autopilot / Guidance ---
limits:
  phi_min: -180.0
  phi_max: 180.0
  theta_min: -90.0
  theta_max: 90.0
  psi_min: 0.0
  psi_max: 360.0
  alt_min: 3000.0
  alt_max: 12000.0
  thr_min: 0.0
  thr_max: 1.0

pid_gains:
  roll:
    P: 1.0
    I: 0.0
    D: 4.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1
  pitch:
    P: 0.01
    I: 0.0
    D: 3.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1
  heading:
    P: 1.8
    I: 0.0
    D: 4.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1

navigation:
  N: 2.0
  dt: 0.1
  cp: 360.0
  acceleration_stage_in_sec: 2.0
  dive_at: 30000.0
  tan_ref: 2000.0
  theta_min_cruise: -30.0
  theta_max_cruise: 30.0
  theta_min: -70.0
  theta_max: 70.0
  alt_cruise: 15000.0

simulation:
  sim_time_step: 6
  control_time_step: 10

performance:
  target_lost_below_mach: 1.0
  target_lost_below_alt: 0.0
  lost_count: 3
  effective_radius: 300.0
