# F-16 target aircraft configuration.
# To use a different target, copy this file and point your scenario YAML at it:
#   target_config_file: "simulation/config/your_target.yaml"

name: "F-16"
type: "aircraft"
fdm_xml: "jsbsim_data/scripts/f16_test.xml"
weight_lbs: 20000.0     # vehicle weight, lbs
length_in: 590.0        # vehicle length, inches

limits:
  phi_min: -180.0       # min roll, degrees
  phi_max: 180.0        # max roll, degrees
  theta_min: -90.0      # min pitch, degrees
  theta_max: 90.0       # max pitch, degrees
  psi_min: 0.0          # min heading, degrees
  psi_max: 360.0        # max heading, degrees
  alt_min: 3000.0       # min altitude, meters
  alt_max: 12000.0      # max altitude, meters
  thr_min: 0.2          # min throttle, 0-1
  thr_max: 0.69         # max throttle (afterburner), 0-1

pid_gains:
  roll:
    P: 0.01
    I: 0.0
    D: 0.9
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.2
    Integ_min: -0.2
  roll_sec:
    P: 0.2
    I: 0.0
    D: 0.2
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 1.0
    Integ_min: -1.0
  pitch:
    P: 0.3
    I: 0.0
    D: 1.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 1.0
    Integ_min: -1.0
  rudder_theta:
    P: 0.05
    I: 0.0
    D: 1.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 10.0
    Integ_min: -10.0
  rudder_psi:
    P: 0.05
    I: 0.0
    D: 1.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 1.0
    Integ_min: -1.0
  elevator_psi:
    P: 0.1
    I: 0.0
    D: 4.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 10.0
    Integ_min: -10.0

navigation:
  head_act_space_min: 10.0   # heading deadband min, degrees
  head_act_space_max: 35.0   # heading deadband max, degrees
  tan_ref: 2000.0            # alt-to-pitch reference, meters
  mach_min: 0.1              # min Mach
  mach_max: 1.2              # max Mach
  v_down_min: -850.0         # min vertical speed, ft/s
  v_down_max: 850.0          # max vertical speed, ft/s
  roll_max: 80.0             # max bank angle, degrees
  pitch_max: 60.0            # max pitch, degrees
  pitch_min: -60.0           # min pitch, degrees
  alt_act_space_min: 1000.0  # altitude deadband min, meters
  alt_act_space_max: 2000.0  # altitude deadband max, meters
  climb_theta_max: 45.0      # max climb pitch, degrees
  dive_theta_max: -45.0      # max dive pitch, degrees
  theta_act_space_min: 10.0  # pitch deadband min, degrees
  theta_act_space_max: 30.0  # pitch deadband max, degrees

simulation:
  sim_time_step: 6           # JSBSim frames per step
  control_time_step: 10      # control update divisor
