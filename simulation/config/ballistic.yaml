name: "Ballistic-RV"
type: "UAV"
fdm_xml: "jsbsim_data/scripts/AIM_test.xml"
fdm_aircraft: "AIM"

# --- Physical Properties ---
# Generic short-range ballistic reentry vehicle
# Stubby body, wide diameter, small control fins
mass:
  weight_lbs: 800.0
  ixx: 10.71
  iyy: 73.37
  izz: 73.37

geometry:
  length_in: 70.0
  diameter_ft: 1.312
  wingspan_ft: 3.94
  wingarea_ft2: 1.353
  cg_x_in: 35.0

# --- Aerodynamic Coefficients ---
# Higher drag (blunt body), lower lift slopes, less control authority
aero:
  ca_base: 0.55
  ca_induced: 3.0
  cn_alpha_body_wing: 4.0
  cn_crossflow: 8.5
  cn_alpha_tail: 2.5
  cn_delta_tail: -2.5
  cy_body_wing: -4.0
  cy_crossflow: -8.5
  cy_tail_beta: -2.5
  cy_rudder: 2.5
  cm_alpha: -12.0
  cm_elevator: 20.0
  cm_q: -15.0
  cn_beta: 12.0
  cn_rudder: -20.0
  cn_r: -15.0
  cl_aileron: 0.3
  cl_coupling: 0.1
  cl_p: -3.0

# --- Flight Control System Limits ---
# Smaller fins = less deflection authority
fcs:
  elevator_rate_max_deg_s: 30.0
  elevator_pos_max_deg: 8.0
  aileron_rate_max_deg_s: 1.0
  aileron_pos_max_deg: 0.1
  rudder_rate_max_deg_s: 30.0
  rudder_pos_max_deg: 8.0

# --- Autopilot / Guidance ---
limits:
  phi_min: -180.0
  phi_max: 180.0
  theta_min: -90.0
  theta_max: 90.0
  psi_min: 0.0
  psi_max: 360.0
  alt_min: 0.0
  alt_max: 200000.0
  thr_min: 0.0
  thr_max: 0.0

pid_gains:
  roll:
    P: 1.0
    I: 0.0
    D: 4.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1
  pitch:
    P: 0.01
    I: 0.0
    D: 3.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1
  heading:
    P: 1.0
    I: 0.0
    D: 4.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1

navigation:
  N: 1.0
  dt: 0.1
  cp: 360.0
  acceleration_stage_in_sec: 0.0
  dive_at: 0.0
  tan_ref: 2000.0
  theta_min_cruise: -30.0
  theta_max_cruise: 30.0
  theta_min: -80.0
  theta_max: 80.0
  alt_cruise: 0.0

simulation:
  sim_time_step: 6
  control_time_step: 10

performance:
  target_lost_below_mach: 0.5
  target_lost_below_alt: 0.0
  lost_count: 10
  effective_radius: 100.0
