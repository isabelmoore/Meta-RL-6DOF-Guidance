name: "Ballistic-V2"
type: "UAV"
fdm_xml: "jsbsim_data/scripts/AIM_test.xml"
fdm_aircraft: "AIM"

# --- Physical Properties ---
# V-2 style ballistic missile
# Long body, tapered ogive nose, small tail fins
mass:
  weight_lbs: 27000.0
  ixx: 1580.0
  iyy: 285000.0
  izz: 285000.0

geometry:
  length_in: 551.0
  diameter_ft: 5.41
  wingspan_ft: 11.8
  wingarea_ft2: 23.0
  cg_x_in: 330.0
  nose_frac: 0.30
  tail_fins: 4
  tail_tip_ratio: 0.35
  tail_sweep: 0.4

# --- Aerodynamic Coefficients ---
# Higher drag (larger body), moderate control
aero:
  ca_base: 0.40
  ca_induced: 3.0
  cn_alpha_body_wing: 4.0
  cn_crossflow: 5.5
  cn_alpha_tail: 2.0
  cn_delta_tail: -2.0
  cy_body_wing: -4.0
  cy_crossflow: -5.5
  cy_tail_beta: -2.0
  cy_rudder: 2.0
  cm_alpha: -10.0
  cm_elevator: 15.0
  cm_q: -12.0
  cn_beta: 10.0
  cn_rudder: -15.0
  cn_r: -12.0
  cl_aileron: 0.2
  cl_coupling: 0.1
  cl_p: -2.0

# --- Flight Control System Limits ---
fcs:
  elevator_rate_max_deg_s: 20.0
  elevator_pos_max_deg: 6.0
  aileron_rate_max_deg_s: 1.0
  aileron_pos_max_deg: 0.1
  rudder_rate_max_deg_s: 20.0
  rudder_pos_max_deg: 6.0

# --- Autopilot / Guidance ---
limits:
  phi_min: -180.0
  phi_max: 180.0
  theta_min: -90.0
  theta_max: 90.0
  psi_min: 0.0
  psi_max: 360.0
  alt_min: 0.0
  alt_max: 200000.0
  thr_min: 0.0
  thr_max: 0.0

pid_gains:
  roll:
    P: 1.0
    I: 0.0
    D: 4.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1
  pitch:
    P: 0.01
    I: 0.0
    D: 3.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1
  heading:
    P: 1.0
    I: 0.0
    D: 4.0
    Deriv: 0.0
    Integ: 0.0
    Integ_max: 0.1
    Integ_min: -0.1

navigation:
  N: 1.0
  dt: 0.1
  cp: 360.0
  acceleration_stage_in_sec: 0.0
  dive_at: 0.0
  tan_ref: 2000.0
  theta_min_cruise: -30.0
  theta_max_cruise: 30.0
  theta_min: -80.0
  theta_max: 80.0
  alt_cruise: 0.0

simulation:
  sim_time_step: 6
  control_time_step: 10

performance:
  target_lost_below_mach: 0.5
  target_lost_below_alt: 0.0
  lost_count: 10
  effective_radius: 100.0
